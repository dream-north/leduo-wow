appId: com.leduowow.app
productName: 乐多汪汪
afterPack: build/afterPack.js
directories:
  buildResources: build
  output: dist
publish:
  provider: github
  owner: dream-north
  repo: leduo-wow
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.*,.prettierrc.*,tsconfig*.json}'
  - '!{dev-app-update.yml,CHANGELOG.md,README.md}'
extraResources:
  - from: build/tray-icon.png
    to: build/tray-icon.png
  - from: build/tray-icon@2x.png
    to: build/tray-icon@2x.png
  - from: build/tray-icon@3x.png
    to: build/tray-icon@3x.png
mac:
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  extraResources:
    - from: src/native-keyboard-listener/SwiftKeyboardListener/build/SwiftKeyboardListener
      to: SwiftKeyboardListener
  extendInfo:
    NSMicrophoneUsageDescription: "乐多汪汪需要使用麦克风进行语音识别"
    NSScreenCaptureUsageDescription: "乐多汪汪需要屏幕录制权限来截取屏幕内容，辅助语音识别文本的润色"
  notarize: false
  target:
    - dmg
    - zip
win:
  icon: build/icon.ico
  extraResources:
    - from: build/icon.ico
      to: icon.ico
    - from: src/native-keyboard-listener/WinKeyServer/build/WinKeyServer.exe
      to: WinKeyServer.exe
  target:
    - nsis
nsis:
  artifactName: leduo-wow-${version}-setup.${ext}
dmg:
  artifactName: leduo-wow-${version}.${ext}
  title: "Leduo Wow ${version}"

